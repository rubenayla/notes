<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#455A64"/>
    </marker>
  </defs>
  <style>
    .h{font-size:20px;font-weight:700;fill:#212121}.s{fill:#616161;font-size:12px}
    .box{fill:#ECEFF1;stroke:#455A64;stroke-width:1.5;rx:8}
    .bt{font-size:14px;font-weight:600;fill:#212121;text-anchor:middle}
    .bs{font-size:11px;fill:#546E7A;text-anchor:middle}
    .edge{stroke:#455A64;stroke-width:1.5;fill:none;marker-end:url(#arr)}
    .el{font-size:11px;fill:#37474F}
    .fail{stroke:#E53935;stroke-width:1.4;fill:none;marker-end:url(#arr);stroke-dasharray:5 3}
  </style>
  <rect width="980" height="470" fill="#ffffff"/>
  <text x="30" y="36" class="h">Handshake state machine (USB-C PD logic, scaled to 400 V)</text>
  <text x="30" y="56" class="s">Brain lives in the wall outlet; the cable is just a CC signature chip + contacts. DC± energized only in ENERGIZE/MONITOR.</text>

  <!-- top row boxes -->
  <g>
    <rect x="30"  y="90" width="150" height="64" class="box" rx="8"/>
    <text x="105" y="116" class="bt">IDLE</text><text x="105" y="135" class="bs">DC± dead · CC pull-up</text>

    <rect x="225" y="90" width="150" height="64" class="box" rx="8"/>
    <text x="300" y="116" class="bt">DETECT</text><text x="300" y="135" class="bs">read CC signature</text>

    <rect x="420" y="90" width="150" height="64" class="box" rx="8"/>
    <text x="495" y="116" class="bt">NEGOTIATE</text><text x="495" y="135" class="bs">tier 48/400 V · max A</text>

    <rect x="615" y="90" width="150" height="64" class="box" rx="8"/>
    <text x="690" y="112" class="bt">ISOLATION</text><text x="690" y="130" class="bs">leakage test</text><text x="690" y="146" class="bs">(400 V only)</text>

    <rect x="810" y="90" width="140" height="64" class="box" rx="8" fill="#FFEBEE" stroke="#E53935"/>
    <text x="880" y="112" class="bt">ENERGIZE</text><text x="880" y="130" class="bs">close SiC</text><text x="880" y="146" class="bs">soft-start</text>
  </g>

  <!-- top row edges -->
  <line x1="180" y1="122" x2="223" y2="122" class="edge"/><text x="183" y="114" class="el">plug+CC</text>
  <line x1="375" y1="122" x2="418" y2="122" class="edge"/><text x="380" y="114" class="el">valid</text>
  <line x1="570" y1="122" x2="613" y2="122" class="edge"/><text x="574" y="114" class="el">agreed</text>
  <line x1="765" y1="122" x2="808" y2="122" class="edge"/><text x="770" y="114" class="el">pass</text>

  <!-- MONITOR -->
  <rect x="810" y="250" width="140" height="64" class="box" rx="8" fill="#FFEBEE" stroke="#E53935"/>
  <text x="880" y="276" class="bt">MONITOR</text><text x="880" y="295" class="bs">I · GF · arc · temp · CC</text>
  <line x1="880" y1="154" x2="880" y2="248" class="edge"/>
  <!-- monitor self loop -->
  <path d="M950 270 h22 v-30 h-22" class="edge"/>
  <text x="958" y="238" class="el">keepalive</text>

  <!-- DE-ENERGIZE -->
  <rect x="420" y="250" width="150" height="64" class="box" rx="8"/>
  <text x="495" y="276" class="bt">DE-ENERGIZE</text><text x="495" y="295" class="bs">open SiC &lt;µs · no arc</text>
  <line x1="810" y1="282" x2="572" y2="282" class="edge"/>
  <text x="600" y="274" class="el">CC lost OR fault</text>

  <!-- back to IDLE -->
  <path d="M420 282 H105 V156" class="edge"/>
  <text x="200" y="274" class="el">reset → IDLE</text>

  <!-- fail edges from row1 down to DE-ENERGIZE -->
  <path d="M300 154 V210 H460 V248" class="fail"/>
  <path d="M495 154 V210 H495 V248" class="fail"/>
  <path d="M690 154 V210 H540 V248" class="fail"/>
  <text x="350" y="205" class="el" fill="#E53935">fail / timeout</text>

  <text x="30" y="360" class="s" font-weight="700">Safety invariant</text>
  <text x="30" y="382" class="s">DC± is live only after: PE bonded · fully mated (CC made) · device validated · (400 V) isolation passed · no active fault.</text>
  <text x="30" y="400" class="s">Any break in that chain opens the SiC switch in microseconds — shock and arc are designed out, not merely mitigated.</text>
  <text x="30" y="418" class="s">The per-outlet SiC switch also replaces the breaker: faster, resettable, per-socket current limiting.</text>
</svg>
