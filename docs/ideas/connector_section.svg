<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="Inter, Helvetica, Arial, sans-serif">
  <style>
    .t{fill:#212121}.s{fill:#616161;font-size:13px}.lbl{font-size:14px;fill:#212121}
    .h{font-size:20px;font-weight:700;fill:#212121}.lead{stroke:#9e9e9e;stroke-width:1;fill:none}
  </style>
  <rect width="980" height="600" fill="#ffffff"/>
  <text x="30" y="38" class="h">Coaxial dead-front DC connector — face &amp; section</text>
  <text x="30" y="60" class="s">DC needs only +/− → two coaxial conductors + a handshake ring + an outer PE shroud. 400 V / 25 A / 10 kW shown.</text>

  <!-- ============ FACE VIEW ============ -->
  <text x="250" y="92" class="lbl" font-weight="700" text-anchor="middle">Face view (into socket)</text>
  <g transform="translate(250,250)">
    <circle r="132" fill="#E8EAED" stroke="#B0BEC5"/>
    <circle r="130" fill="#757575"/>
    <circle r="105" fill="#E8EAED"/>
    <circle r="93"  fill="#43A047"/>
    <circle r="85"  fill="#E8EAED"/>
    <circle r="65"  fill="#1E88E5"/>
    <circle r="50"  fill="#E8EAED"/>
    <circle r="20"  fill="#E53935"/>
    <circle r="20"  fill="none" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- legend -->
  <g transform="translate(60,410)" class="lbl">
    <rect x="0"  y="0"  width="22" height="14" fill="#E53935"/><text x="30" y="12">DC+  center pin Ø4 mm — 25 A</text>
    <rect x="0"  y="26" width="22" height="14" fill="#1E88E5"/><text x="30" y="38">DC−  return ring</text>
    <rect x="0"  y="52" width="22" height="14" fill="#43A047"/><text x="30" y="64">CC  handshake ring — last to mate</text>
    <rect x="0"  y="78" width="22" height="14" fill="#757575"/><text x="30" y="90">PE / shield  outer shell — first to mate, touch-safe</text>
  </g>

  <!-- ============ SECTION VIEW ============ -->
  <text x="720" y="92" class="lbl" font-weight="700" text-anchor="middle">Longitudinal section (plug inserts from left)</text>
  <text x="560" y="118" class="s">PLUG INSERTS →</text>

  <rect x="560" y="125" width="300" height="290" fill="#E8EAED" stroke="#B0BEC5"/>
  <line x1="560" y1="118" x2="560" y2="430" stroke="#455A64" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="560" y="446" class="s" text-anchor="middle">mating face</text>

  <!-- PE shell: protrudes most (first make) -->
  <rect x="560" y="140" width="300" height="25" fill="#757575"/>
  <rect x="560" y="375" width="300" height="25" fill="#757575"/>
  <!-- DC- ring -->
  <rect x="590" y="205" width="270" height="15" fill="#1E88E5"/>
  <rect x="590" y="320" width="270" height="15" fill="#1E88E5"/>
  <!-- DC+ center pin -->
  <rect x="590" y="250" width="270" height="40" fill="#E53935"/>
  <!-- CC ring: recessed (last make) -->
  <rect x="620" y="177" width="240" height="8" fill="#43A047"/>
  <rect x="620" y="355" width="240" height="8" fill="#43A047"/>

  <line x1="545" y1="270" x2="935" y2="270" stroke="#9e9e9e" stroke-width="0.8" stroke-dasharray="8 3 2 3"/>
  <text x="940" y="273" class="s">axis</text>

  <!-- wall electronics block -->
  <rect x="860" y="140" width="75" height="260" fill="#37474F"/>
  <text x="897" y="258" fill="#fff" font-size="12" text-anchor="middle">SiC</text>
  <text x="897" y="274" fill="#fff" font-size="12" text-anchor="middle">switch +</text>
  <text x="897" y="290" fill="#fff" font-size="12" text-anchor="middle">controller</text>
  <text x="897" y="132" class="s" text-anchor="middle">WALL</text>

  <!-- O-ring -->
  <circle cx="567" cy="152" r="5" fill="none" stroke="#212121" stroke-width="2"/>
  <circle cx="567" cy="388" r="5" fill="none" stroke="#212121" stroke-width="2"/>
  <!-- push-pull sleeve bracket -->
  <path d="M548 135 H540 V405 H548" stroke="#455A64" stroke-width="1.5" fill="none"/>

  <!-- callouts -->
  <line x1="540" y1="270" x2="505" y2="270" class="lead"/>
  <text x="500" y="266" class="s" text-anchor="end">push-pull</text>
  <text x="500" y="280" class="s" text-anchor="end">latch sleeve</text>

  <line x1="567" y1="152" x2="600" y2="130" class="lead"/>
  <text x="604" y="128" class="s">O-ring seal</text>

  <text x="648" y="108" class="s">CC recessed → last to make</text>
  <line x1="646" y1="112" x2="624" y2="177" class="lead"/>

  <line x1="705" y1="300" x2="705" y2="292" class="lead"/>
  <text x="705" y="315" class="s" text-anchor="middle">DC± dead until handshake</text>

  <text x="648" y="468" class="s">PE tip protrudes most → first make / last break</text>
  <line x1="646" y1="458" x2="582" y2="402" class="lead"/>

  <text x="30" y="540" class="s" font-weight="700">Mate order  PE → DC± (dead) → CC (last).  Break order reverses → pins are dead before they part → no arc.</text>
  <text x="30" y="562" class="s">OD ≈ 26 mm at 400 V / 25 A / 10 kW.  Scale to OD ≈ 12 mm for the 48 V / 5 A member — same shape, like XT30→XT150.</text>
  <text x="30" y="584" class="s">Center pin Ø4 mm (banana-class, 20–32 A).  Radial walls ≈3 mm = pollution-degree-2 creepage at 400 V.</text>
</svg>
