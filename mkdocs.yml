site_name: Rubén — Notes
site_description: Public notes of Rubén Jiménez Mejías — opinionated standards, references, and conventions
site_author: Rubén Jiménez Mejías
site_url: https://notes.rubenayla.xyz/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - content.code.annotate
  palette:
    # Light mode
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Standards: standards.md
  - Proposed future standards:
    - Power delivery & DC connector: ideas/power-delivery-dc-connector.md
    - Dozenal (base 12): ideas/dozenal.md
    - Fundamental distance unit: ideas/fundamental-distance-unit.md
  - Portfolio ↗: https://rubenayla.xyz/

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rubenayla
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/rubenayla/
      name: LinkedIn
